name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: uvをセットアップ
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: 依存を同期
        run: uv sync --locked

      - name: ruff check
        run: uv run ruff check

      - name: ruff format
        run: uv run ruff format --check

      - name: minport
        run: uv run minport check src/ tests/

      - name: import-linter
        run: uv run lint-imports

      - name: pyrefly
        run: uv run pyrefly check

      - name: pytest
        run: uv run pytest -q

      - name: pip-audit (ランタイム依存の既知CVE監査)
        run: |
          uv export --no-dev --no-hashes --no-emit-project > /tmp/runtime-reqs.txt
          uvx pip-audit -r /tmp/runtime-reqs.txt --disable-pip --no-deps

      - name: ライセンスゲート (ランタイム依存にコピーレフトを持ち込まない)
        run: >
          uv run pip-licenses
          --packages $(uv export --no-dev --no-hashes --no-emit-project | grep -v '^#' | cut -d= -f1 | tr '\n' ' ')
          --fail-on "GNU General Public License v2 (GPLv2);GNU General Public License v3 (GPLv3);GNU Affero General Public License v3;GNU Lesser General Public License v2 (LGPLv2);GNU Lesser General Public License v3 (LGPLv3)"
