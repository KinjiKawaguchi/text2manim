# ツールのバージョンをuv.lockと一致させるため、pre-commitミラーではなく
# ローカルフック (uv run) で実行する。
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: minport
        name: minport
        entry: uv run minport check --fix
        language: system
        types: [python]
        require_serial: true
      - id: pyrefly
        name: pyrefly
        entry: uv run pyrefly check
        language: system
        types: [python]
        pass_filenames: false
      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        types: [python]
        pass_filenames: false
